# nginx config pour servir le build Flutter Web statique
# avec proxy /api → br_server pour éviter CORS

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache aggressive sur les assets versionnés (Flutter génère des hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker : pas de cache (mise à jour PWA immédiate)
    location /flutter_service_worker.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Routes Flutter SPA : fallback vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers br_server pour les routes API et docs
    location /api/ {
        proxy_pass http://br_server:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /menu/ {
        proxy_pass http://br_server:8444;
        proxy_set_header Host $host;
    }

    location /docs/ {
        proxy_pass http://br_server:8444;
        proxy_set_header Host $host;
    }
}
